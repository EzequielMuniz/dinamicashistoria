kind = "web"
previewPath = "/"
title = "Dinâmicas de História"
version = "1.0.0"
id = "artifacts/dinamicas-historia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22800

[services.development]
run = "pnpm --filter @workspace/dinamicas-historia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dinamicas-historia", "run", "build" ]
publicDir = "artifacts/dinamicas-historia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22800"
BASE_PATH = "/"
